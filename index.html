<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Match AI Ver.2</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#eef5ff;
    margin:0;
}
.container{
    max-width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}
h1{
    color:#1565c0;
    text-align:center;
}
.question{
    margin:20px 0;
}
select{
    width:100%;
    padding:10px;
    font-size:16px;
}
button{
    width:100%;
    padding:15px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}
button:hover{
    background:#0d47a1;
}
.card{
    margin-top:25px;
    background:#f7fbff;
    padding:20px;
    border-radius:10px;
}
.rank{
    font-size:20px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🤖 Agent Match AI</h1>

<p>3分であなたに合う転職エージェントを診断します。</p>

<div class="question">
<label>障害者雇用を希望しますか？</label>
<select id="disability">
<option value="yes">はい</option>
<option value="no">いいえ</option>
</select>
</div>

<div class="question">
<label>職種</label>
<select id="job">
<option value="office">事務</option>
<option value="engineer">技術・品質保証</option>
<option value="it">IT</option>
</select>
</div>

<button onclick="diagnose()">診断する</button>

<div id="result"></div>

</div>

<script>
function diagnose(){

const disability=document.getElementById("disability").value;
const job=document.getElementById("job").value;

let result="";

if(disability==="yes"){
result=`
<div class="card">
<div class="rank">🥇 dodaチャレンジ（96点）</div>
<p>障害者雇用に強く、面接対策や定着支援が充実しています。</p>

<div class="rank">🥈 LITALICO仕事ナビ（92点）</div>
<p>一人ひとりに合わせた求人紹介が特徴です。</p>

<div class="rank">🥉 マイナビパートナーズ紹介（89点）</div>
<p>長期就業を重視する方におすすめです。</p>

<div class="rank">🏅 エージェント・サーナ（87点）</div>
<p>障害者専門の老舗エージェント、業界知識が豊富です。</p>

<div class="rank">🏅 ランスタッド（85点）</div>
<p>グローバル企業の求人が豊富、外資系に強みがあります。</p>

<div class="rank">🏅 atGPエージェント（84点）</div>
<p>通勤が難しい方向けのリモート求人が充実しています。</p>
</div>
`;
}else{

if(job==="engineer"){

result=`
<div class="card">
<div class="rank">🥇 リクルートエージェント（94点）</div>
<p>技術職・品質保証の求人が豊富です。</p>

<div class="rank">🥈 ワークポート（90点）</div>
<p>技術系・IT系に強いエージェントです。</p>

<div class="rank">🥉 doda（88点）</div>
<p>幅広い求人を扱っています。</p>
</div>
`;

}else{

result=`
<div class="card">
<div class="rank">🥇 doda（92点）</div>
<p>幅広い職種に対応しています。</p>

<div class="rank">🥈 リクルートエージェント（90点）</div>
<p>業界最大級の求人数があります。</p>

<div class="rank">🥉 マイナビエージェント（88点）</div>
<p>20〜30代の転職支援に強みがあります。</p>
</div>
`;

}

}

document.getElementById("result").innerHTML=result;

}
</script>

</body>
</html>
